<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase a Car - CarShowroom</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="main-nav"></nav>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: 2rem auto;">
            <h2>Finalize Your Purchase</h2>
            
            <div id="alert-success" class="alert alert-success"></div>
            <div id="alert-error" class="alert alert-error"></div>
            
            <form id="purchase-form">
                <div class="form-group">
                    <label>Selected Car ID</label>
                    <input type="text" id="car-id" readonly required>
                </div>
                <div class="form-group">
                    <label>Customer Name *</label>
                    <input type="text" id="customer-name" required>
                </div>
                <div class="form-group">
                    <label>Phone *</label>
                    <input type="tel" id="customer-phone" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="customer-email">
                </div>
                <div class="form-group">
                    <label>Payment Method *</label>
                    <select id="payment-method" required>
                        <option value="1">Credit Card</option>
                        <option value="2">PayPal</option>
                        <option value="3">Cash</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" onclick="closePurchaseModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" id="confirm-purchase-btn" class="btn btn-primary">Confirm Purchase</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Purchase Modal Overlay (for summary if needed) -->
    <div id="purchase-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; flex-direction: column;">
        <div id="purchase-summary" class="card" style="width: 90%; max-width: 500px; padding: 2rem;">
            <!-- Dynamic summary populated by JS -->
        </div>
        <button onclick="closePurchaseModal()" style="margin-top: 1rem; padding: 0.75rem 1.5rem; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer;">Close</button>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/rent.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- jQuery for DataTables -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/rent.js"></script>
    <script>
        // Get car ID from URL if available
        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('carId');
        if (carId) {
            document.getElementById('car-id').value = carId;
            openPurchaseModal(carId, {});
        }

        document.getElementById('purchase-form').addEventListener('submit', (e) => {
            e.preventDefault();
            confirmPurchase();
        });
    </script>
</body>
</html>
