<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CarRental Pro</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="main-nav"></nav>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: 2rem auto;">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create Your Account</h2>
            <p style="text-align: center; font-size: 0.9rem; color: #777; margin-bottom: 2rem;">
                This UI maps to <strong>UC-01: User Registration</strong>, capturing personal and account details.
            </p>
            
            <div id="alert-success" class="alert alert-success"></div>
            <div id="alert-error" class="alert alert-error"></div>
            
            <form id="register-form">
                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="ssn">SSN</label>
                        <input type="number" id="ssn" placeholder="Enter SSN" required>
                    </div>
                    <div class="form-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" placeholder="Last Name" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="Phone" required>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">Birth Date</label>
                        <input type="date" id="birthdate" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="1">Male</option>
                            <option value="2">Female</option>
                        </select>
                    </div>
                </div>

                <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid #eee;">
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Choose username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Choose password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register Now</button>
            </form>
            <p style="text-align: center; margin-top: 1rem;">
                Already have an account? <a href="/login">Login here</a>
            </p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                ssn: document.getElementById('ssn').value,
                fname: document.getElementById('fname').value,
                lname: document.getElementById('lname').value,
                phone: document.getElementById('phone').value,
                birthdate: document.getElementById('birthdate').value,
                genderId: document.getElementById('gender').value,
                email: document.getElementById('email').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            
            console.log('Initiating UC-01 User Registration...', formData);
            
            // In a real app, this calls register(formData) from auth.js
            const successAlert = document.getElementById('alert-success');
            successAlert.innerText = 'Registration successful! (UC-01 Flow Complete). Redirecting to login...';
            successAlert.style.display = 'block';
            
            setTimeout(() => {
                window.location.href = '/login';
            }, 2500);
        });
    </script>
</body>
</html>
