<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent a Car - Carshoowroom</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="main-nav"></nav>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: 2rem auto;">
            <h2>Finalize Your Rental Contract</h2>
            
            
            <div id="alert-success" class="alert alert-success"></div>
            <div id="alert-error" class="alert alert-error"></div>
            
            <form id="rent-form">
                <div class="form-group">
                    <label>Selected Car ID</label>
                    <input type="text" id="car-id" readonly required>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="payment-method" required>
                        <option value="1">Credit Card</option>
                        <option value="2">PayPal</option>
                        <option value="3">Cash on Pickup</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Rental Duration (Days)</label>
                    <input type="number" id="rental-days" min="1" value="1" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Contract</button>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/rent.js"></script>
    <script>
        // Get car ID from URL if available
        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('carId');
        if (carId) document.getElementById('car-id').value = carId;

        document.getElementById('rent-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const contractData = {
                carId: parseInt(document.getElementById('car-id').value),
                paymentMethod: document.getElementById('payment-method').options[document.getElementById('payment-method').selectedIndex].text,
                rentalDays: parseInt(document.getElementById('rental-days').value)
            };
            createRentalContract(contractData);
        });
    </script>
</body>
</html>
